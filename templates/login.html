{% extends "base.html" %}

{% block title %}FindBack - Login{% endblock %}

{% block content %}
<div class="row justify-content-center animate-fade-up">
    <div class="col-md-6 col-lg-5">
        <div class="glass-card p-5 my-5">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3rem;"></i>
                <h2 class="mt-3">Welcome Back</h2>
                <p class="text-secondary">Login to manage your reports and matches</p>
            </div>
            
            <form action="{{ url_for('login') }}" method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-secondary border-0 text-secondary"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control border-0" id="username" name="username" required placeholder="Enter username">
                    </div>
                </div>
                
                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label for="password" class="form-label">Password</label>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text bg-secondary border-0 text-secondary"><i class="bi bi-key"></i></span>
                        <input type="password" class="form-control border-0" id="password" name="password" required placeholder="Enter password">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-3 shadow mb-4">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
            </form>
            
            <div class="text-center text-secondary">
                <span>Don't have an account?</span>
                <a href="{{ url_for('register') }}" class="text-primary fw-bold text-decoration-none ms-1">Register here</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
