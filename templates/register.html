{% extends "base.html" %}

{% block title %}Register | Lost & Found Platform{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-header">
        <h2>Create Account</h2>
        <p>Sign up to report items and claim what belongs to you</p>
    </div>
    
    <div class="glass-panel" style="padding: 2.5rem;">
        <form action="{{ url_for('register') }}" method="POST">
            <div class="form-group">
                <label for="name" class="form-label">Full Name</label>
                <input type="text" id="name" name="name" class="form-control" placeholder="John Doe" required>
            </div>
            
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="john@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="tel" id="phone" name="phone" class="form-control" placeholder="+1 (555) 000-0000" required>
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" minlength="6" required>
            </div>
            
            <div class="form-group" style="margin-bottom: 1.75rem;">
                <label for="confirm_password" class="form-label">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="••••••••" minlength="6" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">
                <i class="fa-solid fa-user-plus"></i> Create Account
            </button>
        </form>
    </div>
    
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.9rem;">
        Already have an account? <a href="{{ url_for('login') }}" style="color: var(--accent); font-weight: 600;">Log in here</a>
    </p>
</div>
{% endblock %}
