{% extends "base.html" %}

{% block title %}FindBack - Register{% endblock %}

{% block content %}
<div class="row justify-content-center animate-fade-up">
    <div class="col-md-7 col-lg-5">
        <div class="glass-card p-5 my-5">
            <div class="text-center mb-4">
                <i class="bi bi-person-plus-fill text-primary" style="font-size: 3rem;"></i>
                <h2 class="mt-3">Create Account</h2>
                <p class="text-secondary">Register to report items and get matched</p>
            </div>
            
            <form action="{{ url_for('register') }}" method="POST" id="register-form">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-secondary border-0 text-secondary"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control border-0" id="username" name="username" required placeholder="Choose a username" minlength="4">
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-secondary border-0 text-secondary"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control border-0" id="email" name="email" required placeholder="name@example.com">
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-secondary border-0 text-secondary"><i class="bi bi-key"></i></span>
                        <input type="password" class="form-control border-0" id="password" name="password" required placeholder="Create strong password" minlength="6">
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-secondary border-0 text-secondary"><i class="bi bi-key-fill"></i></span>
                        <input type="password" class="form-control border-0" id="confirm_password" name="confirm_password" required placeholder="Re-enter password">
                    </div>
                    <div class="invalid-feedback">
                        Passwords do not match.
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-3 shadow mb-4">
                    <i class="bi bi-person-check-fill me-2"></i>Create Account
                </button>
            </form>
            
            <div class="text-center text-secondary">
                <span>Already have an account?</span>
                <a href="{{ url_for('login') }}" class="text-primary fw-bold text-decoration-none ms-1">Login here</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
